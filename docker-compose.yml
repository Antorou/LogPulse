services:
  # --- Infrastructure ---
  redis:
    image: redis:7-alpine
    container_name: logpulse_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # --- Application Backend ---
  api:
    build: ./backend
    container_name: logpulse_api
    environment:
      - DATABASE_URL=sqlite:////data/logpulse.db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super-secret-key-for-local-dev-only-change-in-prod
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_started
    volumes:
      - app_data:/data
    restart: unless-stopped

  celery_worker:
    build: ./backend
    container_name: logpulse_worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=sqlite:////data/logpulse.db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super-secret-key-for-local-dev-only-change-in-prod
    depends_on:
      - api
      - redis
    volumes:
      - app_data:/data
    restart: unless-stopped

  celery_beat:
    build: ./backend
    container_name: logpulse_beat
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=sqlite:////data/logpulse.db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super-secret-key-for-local-dev-only-change-in-prod
    depends_on:
      - api
      - redis
    volumes:
      - app_data:/data
    restart: unless-stopped

  # --- Application Frontend ---
  frontend:
    build: ./frontend
    container_name: logpulse_frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  app_data:
