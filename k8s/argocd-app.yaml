apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logpulse
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Antorou/LogPulse.git'
    path: k8s
    targetRevision: main
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: logpulse
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
