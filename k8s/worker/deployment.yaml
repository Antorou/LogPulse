apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: logpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
      - name: celery-worker
        image: logpulse-api:latest
        imagePullPolicy: Never
        command: ["celery"]
        args: ["-A", "app.worker.celery_app", "worker", "--loglevel=info"]
        envFrom:
        - configMapRef:
            name: logpulse-config
        - secretRef:
            name: logpulse-secrets
