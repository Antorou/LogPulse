apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: logpulse
spec:
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: logpulse-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
